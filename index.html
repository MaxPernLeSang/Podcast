<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🎙️ Podcasts des Élèves</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET & BASE ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f1a;
      --surface: #161928;
      --card: #1c2038;
      --card-hover: #222842;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --accent3: #43e97b;
      --text: #e8eaf6;
      --muted: #7b82b4;
      --radius: 18px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }

    html,
    body {
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ===== ANIMATED BG ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 20%, rgba(108, 99, 255, .18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 85% 75%, rgba(255, 101, 132, .14) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(67, 233, 123, .08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ===== HEADER ===== */
    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 36px 20px 18px;
    }

    header .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 14px;
      box-shadow: 0 4px 18px rgba(108, 99, 255, .5);
    }

    header h1 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 900;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
    }

    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 1rem;
    }

    /* ===== SEARCH BAR ===== */
    .search-wrap {
      position: relative;
      z-index: 10;
      max-width: 520px;
      margin: 18px auto 0;
      padding: 0 20px;
    }

    .search-wrap input {
      width: 100%;
      background: var(--card);
      border: 1.5px solid rgba(108, 99, 255, .3);
      border-radius: 50px;
      padding: 13px 24px 13px 50px;
      font-size: 1rem;
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
    }

    .search-wrap input::placeholder {
      color: var(--muted);
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 36px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      pointer-events: none;
    }

    /* ===== GRID ===== */
    .grid {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      padding: 28px 24px 60px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Galaxy Tab A9 landscape ~1340px wide → 5 cols */
    @media (min-width: 1100px) {
      .grid {
        grid-template-columns: repeat(5, 1fr);
        gap: 18px;
        padding: 24px 20px 60px;
      }
    }

    /* Portrait ~800px wide → 3 cols */
    @media (max-width: 860px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        padding: 18px 16px 60px;
      }
    }

    @media (max-width: 520px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
    }

    /* ===== CARD ===== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      border: 1.5px solid rgba(255, 255, 255, .06);
      transition: transform .22s cubic-bezier(.34, 1.56, .64, 1), box-shadow .22s ease, border-color .22s;
      position: relative;
      box-shadow: var(--shadow);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .card:hover,
    .card:active {
      transform: translateY(-5px) scale(1.025);
      box-shadow: 0 16px 48px rgba(108, 99, 255, .35);
      border-color: rgba(108, 99, 255, .5);
      background: var(--card-hover);
    }

    .card.playing {
      border-color: var(--accent3);
      box-shadow: 0 0 0 2px var(--accent3), 0 16px 40px rgba(67, 233, 123, .3);
    }

    .card.playing .thumb-wrap::after {
      opacity: 1;
    }

    /* Thumbnail */
    .thumb-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #111525;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .4s ease;
    }

    .card:hover .thumb-wrap img,
    .card.playing .thumb-wrap img {
      transform: scale(1.07);
    }

    /* dark overlay */
    .thumb-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(180deg, transparent 40%, rgba(10, 12, 28, .85) 100%);
    }

    /* playing pulse ring */
    .thumb-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      border-radius: 0;
      background: rgba(67, 233, 123, .18);
      opacity: 0;
      transition: opacity .3s;
    }

    /* Play icon overlay */
    .play-overlay {
      position: absolute;
      z-index: 3;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 52px;
      height: 52px;
      background: rgba(108, 99, 255, .85);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 4px 20px rgba(108, 99, 255, .6);
      transition: background .2s, transform .2s;
      backdrop-filter: blur(4px);
    }

    .card:hover .play-overlay {
      background: var(--accent);
      transform: translate(-50%, -50%) scale(1.1);
    }

    .card.playing .play-overlay {
      background: var(--accent3);
    }

    /* Card body */
    .card-body {
      padding: 12px 14px 14px;
    }

    .card-title {
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 10px;
      height: 4px;
      background: rgba(255, 255, 255, .1);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      border-radius: 99px;
      width: 0%;
      transition: width .3s linear;
    }

    /* Duration badge */
    .duration-badge {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .duration-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .card.playing .duration-badge .dot {
      background: var(--accent3);
      animation: pulse-dot 1s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.6);
        opacity: .6;
      }
    }

    /* ===== GLOBAL STOP BAR ===== */
    .stop-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: linear-gradient(135deg, rgba(22, 25, 40, .97), rgba(28, 32, 56, .97));
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(108, 99, 255, .3);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 24px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.34, 1.2, .64, 1);
    }

    .stop-bar.visible {
      transform: translateY(0);
    }

    .stop-bar .now-playing-info {
      flex: 1;
      overflow: hidden;
    }

    .stop-bar .now-playing-label {
      font-size: 0.68rem;
      color: var(--accent3);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .stop-bar .now-playing-title {
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stop-btn {
      background: var(--accent2);
      border: none;
      border-radius: 50px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 10px 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform .15s, box-shadow .15s;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(255, 101, 132, .4);
    }

    .stop-btn:active {
      transform: scale(.95);
    }

    /* ===== NO RESULTS ===== */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 1.1rem;
    }

    .no-results .emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>

  <header>
    <div class="badge">🎙️ Podcasts des Élèves</div>
    <h1>Nos Podcasts</h1>
    <p>Appuie sur un podcast pour l'écouter ✨</p>
  </header>



  <div class="grid" id="grid"></div>

  <div class="stop-bar" id="stopBar">
    <div class="now-playing-info">
      <div class="now-playing-label">▶ En cours</div>
      <div class="now-playing-title" id="nowPlayingTitle">—</div>
    </div>
    <button class="stop-btn" id="stopBtn">⏹ Stop</button>
  </div>

  <script>
    // ===== DATA =====
    // Map each podcast to its image and a clean display title
    const PODCASTS = [
      {
        file: "Podcasts/Alice et Léonie Notre école.wav",
        image: "Image/Alice et Léonie Notre école.jpg",
        title: "Notre École",
        authors: "Alice & Léonie"
      },
      {
        file: "Podcasts/Efi et Harmonie les marmottes.wav",
        image: "Image/Efi et Harmonie les marmottes.jpg",
        title: "Les Marmottes",
        authors: "Efi & Harmonie"
      },
      {
        file: "Podcasts/Eva et Lyne le ski alpin.wav",
        image: "Image/Eva et Lyne le ski alpin.jpg",
        title: "Le Ski Alpin",
        authors: "Eva & Lyne"
      },
      {
        file: "Podcasts/Indiana Mael Le Ski Club.wav",
        image: "Image/Indiana Mael Le Ski Club.jpg",
        title: "Le Ski Club",
        authors: "Indiana & Maël"
      },
      {
        file: "Podcasts/Jules et Emile les remontées mécaniques.wav",
        image: "Image/Jules et Emile les remontées mécaniques.jpg",
        title: "Les Remontées Mécaniques",
        authors: "Jules & Emile"
      },
      {
        file: "Podcasts/Le rap Tom et Leo.wav",
        image: "Image/Le rap Tom et Leo.jpg",
        title: "Le Rap",
        authors: "Tom & Leo"
      },
      {
        file: "Podcasts/Leonard et Sandro Le Plan de l'Arc.wav",
        image: "Image/Leonard et Sandro Le Plan de l'Arc.jpg",
        title: "Le Plan de l'Arc",
        authors: "Léonard & Sandro"
      },
      {
        file: "Podcasts/Les abeilles Giulia et Maya.wav",
        image: "Image/Les abeilles Giulia et Maya.jpg",
        title: "Les Abeilles",
        authors: "Giulia & Maya"
      },
      {
        file: "Podcasts/Les énergies Lohan.wav",
        image: "Image/Les énergies Lohan.png",
        title: "Les Énergies",
        authors: "Lohan"
      },
      {
        file: "Podcasts/amelie et thelma Le malinois.wav",
        image: "Image/amelie et thelma Le malinois.jpeg",
        title: "Le Malinois",
        authors: "Amélie & Thelma"
      },
      {
        file: "Podcasts/cassius et Léonard La tortue marine.wav",
        image: "Image/cassius et Léonard La tortue marine.jpeg",
        title: "La Tortue Marine",
        authors: "Cassius & Léonard"
      },
      {
        file: "Podcasts/clementine et Marius Coupe du monde ski.wav",
        image: "Image/clementine et Marius Coupe du monde ski.jpg",
        title: "Coupe du Monde de Ski",
        authors: "Clémentine & Marius"
      },
      {
     {
        file: "Podcasts/lucas_et_nathan_galette.wav", // Renomme ton fichier ainsi
        image: "Image/lucas et nathan  galette.webp",
        title: "La Galette des Rois",
        authors: "Lucas & Nathan"
      },
      {
        file: "Podcasts/mixage Katel Le cheval.wav",
        image: "Image/mixage Katel Le cheval.jpg",
        title: "Le Cheval",
        authors: "Katel"
      },
      {
        file: "Podcasts/mixage ella livia Les sports de glace.wav",
        image: "Image/3d31a3_6e430281392344be80fa70ba82a4c30f~mv2.jpg",
        title: "Les Sports de Glace",
        authors: "Ella & Livia"
      },
      {
        file: "Podcasts/nathan final La poule.wav",
        image: "Image/nathan final La poule.jpg",
        title: "La Poule",
        authors: "Nathan"
      },
      {
        file: "Podcasts/pia et Matys Le guépard.wav",
        image: "Image/pia et Matys Le guépard.jpg",
        title: "Le Guépard",
        authors: "Pia & Matys"
      },
      {
        file: "Podcasts/thelma_air_final.wav", // Renomme ton fichier ainsi
        image: "Image/thelma l'air.jpeg",
        title: "L'Air",
        authors: "Thelma"
      }
    ];

    // ===== STATE =====
    let currentAudio = null;
    let currentCard = null;
    let progressInterval = null;

    // ===== BUILD GRID =====
    const grid = document.getElementById('grid');
    const stopBar = document.getElementById('stopBar');
    const stopBtn = document.getElementById('stopBtn');
    const nowPlayingTitle = document.getElementById('nowPlayingTitle');

    function buildGrid(items) {
      grid.innerHTML = '';
      if (items.length === 0) {
        grid.innerHTML = '<div class="no-results"><span class="emoji">🔍</span>Aucun podcast trouvé…</div>';
        return;
      }
      items.forEach((pod, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.idx = idx;
        card.innerHTML = `
          <div class="thumb-wrap">
            <img src="${pod.image}" alt="${pod.title}" loading="lazy" />
            <div class="play-overlay" id="play-icon-${idx}">▶</div>
          </div>
          <div class="card-body">
            <div class="card-title">${pod.authors}<br><span style="color:var(--muted);font-weight:600">${pod.title}</span></div>
            <div class="progress-wrap"><div class="progress-bar" id="prog-${idx}"></div></div>
            <div class="duration-badge"><div class="dot"></div><span id="dur-${idx}">—</span></div>
          </div>
        `;
        card.addEventListener('click', () => togglePlay(pod, card, idx));
        grid.appendChild(card);
      });
    }

    buildGrid(PODCASTS);

    // ===== PLAY / PAUSE =====
    function togglePlay(pod, card, idx) {
      const isSameCard = currentCard === card;

      // Stop current
      stopEverything();

      if (isSameCard) return; // was already playing → just stop

      // Start new
      const audio = new Audio(pod.file);
      currentAudio = audio;
      currentCard = card;
      card.classList.add('playing');
      document.getElementById('play-icon-' + idx).textContent = '⏸';
      nowPlayingTitle.textContent = pod.authors + ' — ' + pod.title;
      stopBar.classList.add('visible');

      audio.play().catch(() => { });

      audio.addEventListener('loadedmetadata', () => {
        document.getElementById('dur-' + idx).textContent = formatTime(audio.duration);
      });

      progressInterval = setInterval(() => {
        const prog = document.getElementById('prog-' + idx);
        if (prog && audio.duration) {
          prog.style.width = (audio.currentTime / audio.duration * 100) + '%';
          document.getElementById('dur-' + idx).textContent =
            formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
        }
      }, 300);

      audio.addEventListener('ended', stopEverything);
    }

    function stopEverything() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }
      if (currentCard) {
        currentCard.classList.remove('playing');
        const idx = currentCard.dataset.idx;
        const icon = document.getElementById('play-icon-' + idx);
        const prog = document.getElementById('prog-' + idx);
        if (icon) icon.textContent = '▶';
        if (prog) prog.style.width = '0%';
        currentCard = null;
      }
      clearInterval(progressInterval);
      stopBar.classList.remove('visible');
    }

    stopBtn.addEventListener('click', stopEverything);

    // ===== FORMAT TIME =====
    function formatTime(s) {
      if (!isFinite(s)) return '—';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ':' + String(sec).padStart(2, '0');
    }


  </script>
</body>

</html>
